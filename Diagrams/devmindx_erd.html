
<div id="erd" style="padding:12px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2869' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
  },
});
const diagram = `erDiagram
  USER ||--o{ PROJECT : owns
  USER ||--o{ PROJECT_COLLABORATOR : "collaborates on"
  PROJECT ||--o{ PROJECT_COLLABORATOR : has
  PROJECT ||--o{ FILE : contains
  USER ||--o{ FILE : "creates/modifies"
  PROJECT ||--o{ COLLABORATION_SESSION : has
  USER ||--o{ COLLABORATION_SESSION : hosts
  USER ||--o{ SESSION_PARTICIPANT : joins
  COLLABORATION_SESSION ||--o{ SESSION_PARTICIPANT : includes
  COLLABORATION_SESSION ||--o{ EDIT_HISTORY : records
  FILE ||--o{ EDIT_HISTORY : tracks
  USER ||--o{ EDIT_HISTORY : makes
  COLLABORATION_SESSION ||--o{ CHAT_MESSAGE : has
  USER ||--o{ CHAT_MESSAGE : sends
  CHAT_MESSAGE ||--o{ CHAT_MESSAGE : replies_to
  COLLABORATION_SESSION ||--o| VIDEO_MEETING : has
  USER ||--o{ VIDEO_MEETING : hosts
  VIDEO_MEETING ||--o{ MEETING_PARTICIPANT : has
  USER ||--o{ MEETING_PARTICIPANT : attends
  COLLABORATION_SESSION ||--o{ WHITEBOARD : has
  USER ||--o{ WHITEBOARD : creates
  USER ||--o{ AI_CONVERSATION : has
  PROJECT ||--o{ AI_CONVERSATION : context
  AI_CONVERSATION ||--o{ AI_MESSAGE : contains
  USER ||--o{ EXECUTION_LOG : runs
  PROJECT ||--o{ EXECUTION_LOG : has
  USER ||--o{ TEMPLATE : creates

  USER {
    uuid user_id PK
    string username
    string email
    string password_hash
    string full_name
    string oauth_provider
    boolean is_premium
    timestamp created_at
  }

  PROJECT {
    uuid project_id PK
    uuid owner_id FK
    string name
    string project_type
    string framework
    string language
    boolean is_public
    timestamp created_at
  }

  FILE {
    uuid file_id PK
    uuid project_id FK
    string file_path
    string file_name
    string file_type
    text content
    uuid created_by FK
  }

  COLLABORATION_SESSION {
    uuid session_id PK
    uuid project_id FK
    uuid host_id FK
    string session_type
    boolean is_active
    timestamp created_at
  }

  SESSION_PARTICIPANT {
    uuid participant_id PK
    uuid session_id FK
    uuid user_id FK
    string role
    string cursor_color
    boolean is_online
  }

  EDIT_HISTORY {
    uuid edit_id PK
    uuid session_id FK
    uuid file_id FK
    uuid user_id FK
    string edit_type
    int start_line
    text old_content
    text new_content
  }

  CHAT_MESSAGE {
    uuid message_id PK
    uuid session_id FK
    uuid user_id FK
    string message_type
    text content
    uuid reply_to FK
  }

  VIDEO_MEETING {
    uuid meeting_id PK
    uuid session_id FK
    uuid host_id FK
    timestamp start_time
    int duration_seconds
    string summary_pdf_url
  }

  MEETING_PARTICIPANT {
    uuid mp_id PK
    uuid meeting_id FK
    uuid user_id FK
    timestamp joined_at
    boolean shared_screen
  }

  WHITEBOARD {
    uuid whiteboard_id PK
    uuid session_id FK
    uuid created_by FK
    string title
    json canvas_data
  }

  AI_CONVERSATION {
    uuid conversation_id PK
    uuid user_id FK
    uuid project_id FK
    string conversation_type
    timestamp created_at
  }

  AI_MESSAGE {
    uuid ai_message_id PK
    uuid conversation_id FK
    string role
    text content
    int tokens_used
    string model_used
  }

  EXECUTION_LOG {
    uuid execution_id PK
    uuid user_id FK
    uuid project_id FK
    string language
    text code
    text output
    int exit_code
    int execution_time_ms
  }

  PROJECT_COLLABORATOR {
    uuid collaborator_id PK
    uuid project_id FK
    uuid user_id FK
    string role
    timestamp invited_at
  }

  TEMPLATE {
    uuid template_id PK
    string name
    string category
    string framework
    boolean is_official
    uuid created_by FK
  }
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd .row-rect-odd path, #erd .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
